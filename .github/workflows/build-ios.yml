name: Build Unsigned iOS IPA

on:
  workflow_dispatch: # Cho phep ban bam nut chay thu cong

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tao file .env tu GitHub Secrets
        run: |
          cat << 'EOF' > .env
          BACKEND_BASE_URL=${{ secrets.BACKEND_BASE_URL }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          EOF

      - name: Gan Google Maps API key vao Info.plist (tranh crash iOS khi mo map)
        env:
          GMS_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -n "$GMS_KEY" ]; then
            /usr/libexec/PlistBuddy -c "Set :GMS_API_KEY $GMS_KEY" ios/Runner/Info.plist
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: app.ipa

      - name: Hien thi link tai IPA
        run: |
          echo "## Tai file IPA (unsigned-ipa)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Chay xong. De tai file **app.ipa**: vao trang run nay, keo xuong phan **Artifacts**, bam vao **unsigned-ipa** de tai ve." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Link truc tiep trang run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
